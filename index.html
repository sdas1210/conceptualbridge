<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conceptual Bridge</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #1a365d, #2a4365, #2b6cb0, #3182ce);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; /* Animated moving background gradient */
        }

        h1 {
            color: white;
            font-size: 3.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s ease-out forwards; /* Smooth text entrance animation */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to Conceptual Bridge</h1>
</body>
</html>
