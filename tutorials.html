<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Tutorial Corner - Conceptual Bridge</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
            background: linear-gradient(-45deg, #1a365d, #2a4365, #2b6cb0, #3182ce);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .back-btn {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 16px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-left-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .back-btn:hover { 
            background: rgba(255, 255, 255, 0.25); 
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        h1 {
            text-align: center;
            margin: 0 0 10px 0;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .subtitle {
            text-align: center;
            color: #d1d5db;
            margin-bottom: 35px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        /* WINDOWS VISTA AERO GLASS GRID CONTAINER */
        .table-container {
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-top-color: rgba(255, 255, 255, 0.55);
            border-left-color: rgba(255, 255, 255, 0.55);
            border-radius: 8px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            overflow-x: auto;
        }

        .studio-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 850px;
        }

        .studio-table th {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
            padding: 16px 20px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #bfdbfe;
            border-bottom: 2px solid rgba(255, 255, 255, 0.25);
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }

        .studio-table td {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.95rem;
            vertical-align: middle;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }

        .studio-table tr:hover {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
        }

        .title-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .video-title-txt {
            font-weight: 500;
            color: #ffffff;
            line-height: 1.4;
            font-size: 1rem;
        }

        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .attribute-badge {
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 2px 6px;
            border-radius: 3px;
            color: #93c5fd;
            text-transform: uppercase;
        }

        /* VISTA GLOSS BUTTON LAYOUT CODES */
        .btn-studio {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-top-color: rgba(255, 255, 255, 0.4);
            border-left-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-play {
            background: linear-gradient(180deg, rgba(239, 68, 68, 0.25) 0%, rgba(185, 28, 28, 0.15) 100%);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.4);
        }
        .btn-play:hover {
            background: linear-gradient(180deg, rgba(239, 68, 68, 0.4) 0%, rgba(185, 28, 28, 0.25) 100%);
            border-color: rgba(239, 68, 68, 0.6);
            color: #ffffff;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .btn-download {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
            color: #e2e8f0;
        }
        .btn-download:hover {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.07) 100%);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }

        .btn-quiz {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.25) 0%, rgba(29, 78, 216, 0.15) 100%);
            color: #93c5fd;
            border-color: rgba(59, 130, 246, 0.4);
        }
        .btn-quiz:hover {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.4) 0%, rgba(29, 78, 216, 0.25) 100%);
            border-color: rgba(59, 130, 246, 0.6);
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        /* ROW LANGUAGE PILLS SYSTEM */
        .row-lang-selector {
            display: flex;
            gap: 5px;
        }
        .lang-pill {
            padding: 2px 6px;
            font-size: 0.7rem;
            border-radius: 3px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1;
            cursor: pointer;
            font-weight: 600;
        }
        .lang-pill.active {
            background: linear-gradient(180deg, #3182ce 0%, #2b6cb0 100%);
            border-color: rgba(255,255,255,0.3);
            color: white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        /* SHUFFLED QUIZ LAYER OVERLAYS */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }

        .modal-window {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.94) 0%, rgba(15, 23, 42, 0.96) 100%);
            backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35); border-top-color: rgba(255, 255, 255, 0.55); border-left-color: rgba(255, 255, 255, 0.55);
            border-radius: 8px; max-width: 650px; width: 100%; padding: 25px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            max-height: 85vh; overflow-y: auto; color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Home</a>
    <h1>🎓 Free Tutorial Corner</h1>
    <p class="subtitle">YouTube Studio Content Grid — Live Sessions, Document References & Instant Quizzes</p>

    <!-- CONTENT DATA STUDIO LIST GRID -->
    <div class="table-container">
        <table class="studio-table">
            <thead>
                <tr>
                    <th style="width: 45%;">Video Content & Attributes</th>
                    <th style="width: 15%; text-align: center;">Play Video</th>
                    <th style="width: 20%; text-align: center;">Download Reference PDF</th>
                    <th style="width: 20%; text-align: center;">Take a Free Test</th>
                </tr>
            </thead>
            <tbody id="studio-table-body">
                <!-- Data streams load from text routing loops automatically -->
            </tbody>
        </table>
    </div>

    <!-- VISTA MODE QUIZ PANEL WINDOW FRAMEWORK -->
    <div id="quiz-modal-overlay" class="modal-overlay">
        <div class="modal-window">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; margin-bottom: 20px; text-shadow: 0 1px 4px rgba(0,0,0,0.5);">
                <h3 id="quiz-modal-title" style="margin:0; color:#93c5fd; font-weight: 500; font-size: 1.25rem;">Mini Chapter Random Shuffled Test (10Q)</h3>
                <button onclick="closeQuizModal()" style="background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2); color: white; font-size: 0.9rem; padding: 3px 10px; border-radius: 4px; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(239, 68, 68, 0.6)';" onmouseout="this.style.background='rgba(255, 255, 255, 0.15)';">✕</button>
            </div>
            <div id="quiz-content-loading" style="padding: 20px; text-align: center; font-style: italic; color: #cbd5e1;">Reading source text rules...</div>
            <div id="quiz-questions-body" style="display:none; flex-direction:column; gap:20px; margin-bottom: 20px;"></div>
            <div style="display:flex; justify-content:flex-end; border-top:1px solid rgba(255,255,255,0.2); padding-top:15px;">
                <button class="btn-studio btn-quiz" style="padding: 10px 24px;" onclick="alert('Answers captured successfully!')">Submit Test</button>
            </div>
        </div>
    </div>

    <script>
        // List the file indexes uploaded inside your Video/ directory (e.g., Video/1.txt, Video/2.txt)
        const uploadedVideoFiles = [1, 2]; 
        let cachedLoadedData = {};

        async function generateStudioTableLayout() {
            const tbody = document.getElementById('studio-table-body');
            tbody.innerHTML = '';

            for (let fileNum of uploadedVideoFiles) {
                try {
                    const response = await fetch(`Video/${fileNum}.txt`);
                    if (!response.ok) continue;

                    const rawText = await response.text();
                    const parsed = parseTextFileData(rawText);
                    cachedLoadedData[fileNum] = parsed;

                    const tagHtml = parsed.tags.map(t => `<span class="attribute-badge">${t}</span>`).join('');
                    const hasSeparateLangs = (parsed.english && parsed.bengali && parsed.english !== parsed.bengali && parsed.bengali.toLowerCase() !== 'none');
                    
                    let toggleControlsHtml = '';
                    if (hasSeparateLangs) {
                        toggleControlsHtml = `
                            <div class="row-lang-selector" style="margin-top: 6px;">
                                <span id="pill-eng-${fileNum}" class="lang-pill active" onclick="switchRowLanguageContext(${fileNum}, 'english')">ENG</span>
                                <span id="pill-ben-${fileNum}" class="lang-pill" onclick="switchRowLanguageContext(${fileNum}, 'bengali')">BEN</span>
                            </div>
                        `;
                    }

                    const initialVideo = parsed.english;
                    const initialPdf = parsed.pdf_english ? `Resource/${parsed.pdf_english}` : '#';

                    const trHtml = `
                        <tr id="row-${fileNum}">
                            <td>
                                <div class="title-block">
                                    <span class="video-title-txt">${parsed.title}</span>
                                    <div class="meta-tags">${tagHtml}</div>
                                    ${toggleControlsHtml}
                                </div>
                            </td>
                            <td style="text-align: center;">
                                <a id="play-${fileNum}" href="https://www.youtube.com/watch?v=${initialVideo}" target="_blank" class="btn-studio btn-play">
                                    ▶ Play Video
                                </a>
                            </td>
                            <td style="text-align: center;">
                                <a id="dl-${fileNum}" href="${initialPdf}" class="btn-studio btn-download" download>
                                    📁 Download PDF
                                </a>
                            </td>
                            <td style="text-align: center;">
                                <button class="btn-studio btn-quiz" onclick="compileMiniTest('${parsed.test_source}')">
                                    ✍️ Take 10Q Test
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', trHtml);
                } catch (e) {
                    console.error(`Error loading file matrix index ${fileNum}:`, e);
                }
            }
        }

        function parseTextFileData(text) {
            const data = {};
            const lines = text.split('\n');
            lines.forEach(line => {
                const parts = line.split('|');
                if (parts.length >= 2) {
                    const key = parts[0].trim().toLowerCase();
                    const value = parts.slice(1).join('|').trim();
                    
                    if (key === 'tags') {
                        data[key] = value.split(',').map(t => t.trim());
                    } else {
                        data[key] = value;
                    }
                }
            });
            if (!data.tags) data.tags = ["Tutorial"];
            return data;
        }

        function switchRowLanguageContext(fileNum, chosenLang) {
            const data = cachedLoadedData[fileNum];
            if (!data) return;

            const videoId = chosenLang === 'english' ? data.english : data.bengali;
            const pdfName = chosenLang === 'english' ? data.pdf_english : data.pdf_bengali;

            document.getElementById(`play-${fileNum}`).href = `https://www.youtube.com/watch?v=${videoId}`;
            document.getElementById(`dl-${fileNum}`).href = pdfName ? `Resource/${pdfName}` : '#';

            const engPill = document.getElementById(`pill-eng-${fileNum}`);
            const benPill = document.getElementById(`pill-ben-${fileNum}`);

            if (chosenLang === 'english') {
                engPill.className = 'lang-pill active';
                benPill.className = 'lang-pill';
            } else {
                engPill.className = 'lang-pill';
                benPill.className = 'lang-pill active';
            }
        }

        function compileMiniTest(sourceFile) {
            document.getElementById('quiz-modal-overlay').style.display = 'flex';
            document.getElementById('quiz-content-loading').style.display = 'block';
            document.getElementById('quiz-questions-body').style.display = 'none';

            setTimeout(() => {
                document.getElementById('quiz-content-loading').style.display = 'none';
                const body = document.getElementById('quiz-questions-body');
                body.innerHTML = '';
                body.style.display = 'flex';

                const mockQuestions = Array.from({length: 100}, (_, i) => ({
                    text: `Exam Practice Concept Task #${i + 1} loaded from target profile string: (${sourceFile})`,
                    options: ["Option A Matrix", "Option B Correct Value", "Option C Delta Track", "Option D Framework"]
                }));

                for (let i = mockQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [mockQuestions[i], mockQuestions[j]] = [mockQuestions[j], mockQuestions[i]];
                }

                mockQuestions.slice(0, 10).forEach((q, index) => {
                    const html = `
                        <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:6px; border:1px solid rgba(255,255,255,0.12);">
                            <div style="font-weight:500; margin-bottom:10px; text-shadow: 0 1px 2px rgba(0,0,0,0.4);">Q${index + 1}: ${q.text}</div>
                            <div style="display:grid; grid-template-columns:1fr; gap:8px;">
                                ${q.options.map((o, oi) => `
                                    <label style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding:8px 12px; border-radius:4px; cursor:pointer; font-size:0.9rem;">
                                        <input type="radio" name="q_${index}" value="${oi}"> ${o}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    body.insertAdjacentHTML('beforeend', html);
                });
            }, 700);
        }

        function closeQuizModal() {
            document.getElementById('quiz-modal-overlay').style.display = 'none';
        }

        generateStudioTableLayout();
    </script>
</body>
</html>
