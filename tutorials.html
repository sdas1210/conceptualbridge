<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Tutorial Corner - Conceptual Bridge</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(-45deg, #1a365d, #2a4365, #2b6cb0, #3182ce);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .back-btn {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

        h1 {
            text-align: center;
            margin: 0 0 10px 0;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 35px;
        }

        /* GRID SYSTEM FOR LECTURE CARDS */
        .tutorials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* AERO GLASS CARD LAYOUT */
        .video-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-top-color: rgba(255, 255, 255, 0.45);
            border-left-color: rgba(255, 255, 255, 0.45);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .attribute-badge {
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 3px 8px;
            border-radius: 4px;
            color: #93c5fd;
            text-transform: uppercase;
        }

        .card-title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
        }

        /* LANGUAGE SELECTION CONTROL PILLS */
        .lang-control-bar {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3px;
            border-radius: 8px;
            gap: 4px;
        }

        .lang-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #cbd5e1;
            padding: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #2b6cb0;
            color: white;
            box-shadow: 0 2px 8px rgba(43, 108, 176, 0.4);
        }

        /* ACTIONS ROW PLATFORM CONFIG */
        .actions-row {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-download {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .btn-download:hover { background: rgba(255, 255, 255, 0.15); }

        .btn-quiz {
            background: #2b6cb0;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 4px 12px rgba(43, 108, 176, 0.3);
        }
        .btn-quiz:hover { background: #2c5282; }

        /* VISTA AERO TEST MODAL LAYOUT */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-window {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.98) 100%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 12px;
            max-width: 650px;
            width: 100%;
            padding: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 500px) {
            .actions-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Home</a>
    <h1>🎓 Free Tutorial Corner</h1>
    <p class="subtitle">Video concept classes, source summaries, and mini-shuffled mock checkouts</p>

    <div class="tutorials-grid" id="sessions-grid-target">
        <!-- System Data Streams Inject Content via JS Automatically -->
    </div>

    <!-- QUIZ COMPILER FRAMEWORK OVERLAY MODAL -->
    <div id="quiz-modal-overlay" class="modal-overlay">
        <div class="modal-window">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; margin-bottom: 15px;">
                <h3 id="quiz-modal-title" style="margin:0; color:#93c5fd;">Mini Target Shuffled Test (10 Questions)</h3>
                <button onclick="closeQuizModal()" style="background:transparent; border:none; color:white; font-size:1.1rem; cursor:pointer;">✕</button>
            </div>
            <div id="quiz-content-loading" style="padding: 20px; text-align: center; font-style: italic; color: #cbd5e1;">Compiling dynamic file metrics...</div>
            <div id="quiz-questions-body" style="display:none; flex-direction:column; gap:20px; margin-bottom: 20px;">
                <!-- 10 Shuffled Questions render here -->
            </div>
            <div style="display:flex; justify-content:flex-end; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                <button class="btn-action btn-quiz" style="max-width:18px0px; flex:none;" onclick="alert('Score calculated successfully!')">Submit Test</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG MASTER DATA DATASET ARRAY VECTOR
        const tutorialSessions = [
            {
                id: "session-ga-01",
                subject: "General Awareness",
                topic: "Top 100 GK/GA Live Question Analysis (Set 1)",
                tags: ["RRB Group D", "Level-1", "GACA", "100-Series"],
                quizSource: "1.txt", // Your 1.txt question matrix reference
                languages: {
                    bengali: { youtubeId: "dQw4w9WgXcQ", pdfUrl: "/downloads/ga1_ben.pdf" },
                    english: { youtubeId: "3JZ_D3ELwOQ", pdfUrl: "/downloads/ga1_eng.pdf" }
                }
            },
            {
                id: "session-math-01",
                subject: "Mathematics",
                topic: "Speed Math & Logical Percentage Extraction Matrix",
                tags: ["RRB Group D", "Level-1", "Math Tricks"],
                quizSource: "2.txt", // Your 2.txt question matrix reference
                languages: {
                    combined: { youtubeId: "kJQP7kiw5Fk", pdfUrl: "/downloads/math1_shared.pdf" }
                }
            }
        ];

        function renderTutorialBoards() {
            const targetGrid = document.getElementById('sessions-grid-target');
            targetGrid.innerHTML = '';

            tutorialSessions.forEach((session) => {
                const tagHtml = session.tags.map(t => `<span class="attribute-badge">${t}</span>`).join('');
                
                // Establish initial language channel config context
                const keys = Object.keys(session.languages);
                const hasSeparateLangs = keys.includes('bengali') && keys.includes('english');
                const initialLang = hasSeparateLangs ? 'english' : 'combined';
                const initialData = session.languages[initialLang];

                let langControlsHtml = ``;
                if (hasSeparateLangs) {
                    langControlsHtml = `
                        <div class="lang-control-bar">
                            <button id="btn-lang-eng-${session.id}" class="lang-btn active" onclick="toggleSessionLanguage('${session.id}', 'english')">English Track</button>
                            <button id="btn-lang-ben-${session.id}" class="lang-btn" onclick="toggleSessionLanguage('${session.id}', 'bengali')">Bengali Version</button>
                        </div>
                    `;
                } else {
                    langControlsHtml = `
                        <div class="lang-control-bar"><div style="font-size:0.8rem; padding:6px; color:#a0aec0; width:100%; text-align:center; font-weight:600;">Dual Language Combined Video</div></div>
                    `;
                }

                const cardHtml = `
                    <div class="video-card" id="card-${session.id}">
                        <div class="meta-tags">${tagHtml}</div>
                        <h2 class="card-title">${session.topic}</h2>
                        
                        <div class="video-wrapper">
                            <iframe id="iframe-${session.id}" src="https://www.youtube.com/embed/${initialData.youtubeId}" allowfullscreen></iframe>
                        </div>

                        ${langControlsHtml}

                        <div class="actions-row">
                            <a id="link-dl-${session.id}" href="${initialData.pdfUrl}" class="btn-action btn-download" download>📁 Download PDF</a>
                            <button class="btn-action btn-quiz" onclick="loadMiniQuizStream('${session.quizSource}', '${session.topic}')">✍️ Take 10Q Test</button>
                        </div>
                    </div>
                `;
                targetGrid.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        function toggleSessionLanguage(sessionId, targetLang) {
            const targetSession = tutorialSessions.find(s => s.id === sessionId);
            if (!targetSession) return;

            const langData = targetSession.languages[targetLang];
            if (!langData) return;

            // Shift Player iframe elements dynamically
            document.getElementById(`iframe-${sessionId}`).src = `https://www.youtube.com/embed/${langData.youtubeId}`;
            // Shift Downloader targets dynamically
            document.getElementById(`link-dl-${sessionId}`).href = langData.pdfUrl;

            // Shift Button styles elements toggles
            const engBtn = document.getElementById(`btn-lang-eng-${sessionId}`);
            const benBtn = document.getElementById(`btn-lang-ben-${sessionId}`);

            if (targetLang === 'english') {
                engBtn.className = 'lang-btn active';
                benBtn.className = 'lang-btn';
            } else {
                engBtn.className = 'lang-btn';
                benBtn.className = 'lang-btn active';
            }
        }

        // SIMULATED SYSTEM SHUFFLING ENGINE MATRICES (Fisher-Yates)
        function loadMiniQuizStream(sourceFile, topicName) {
            document.getElementById('quiz-modal-overlay').style.display = 'flex';
            document.getElementById('quiz-content-loading').style.display = 'block';
            document.getElementById('quiz-questions-body').style.display = 'none';
            
            // Simulating reading your 1.txt or 2.txt assets via fetch
            setTimeout(() => {
                document.getElementById('quiz-content-loading').style.display = 'none';
                const questionsBody = document.getElementById('quiz-questions-body');
                questionsBody.innerHTML = '';
                questionsBody.style.display = 'flex';

                // Mocking an array of parsed source lines from your raw text parameters
                const mockParsedLines = Array.from({length: 100}, (_, i) => ({
                    num: i + 1,
                    text: `Sample Examination Problem Concept #${i + 1} mapping parameters from ${sourceFile}?`,
                    opts: ["Option Alpha Choice Matrix", "Option Beta Correct Verdict", "Option Gamma Structural Path", "Option Delta Threshold Entry"]
                }));

                // Shuffle elements array loop cleanly
                for (let i = mockParsedLines.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [mockParsedLines[i], mockParsedLines[j]] = [mockParsedLines[j], mockParsedLines[i]];
                }

                // Slice down exactly to 10 items row limit configurations
                const testSelection = mockParsedLines.slice(0, 10);

                testSelection.forEach((q, index) => {
                    const qHtml = `
                        <div style="background:rgba(255,255,255,0.04); padding:15px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);">
                            <div style="font-weight:600; margin-bottom:10px;">Q${index + 1}: ${q.text}</div>
                            <div style="display:grid; grid-template-columns:1fr; gap:8px;">
                                ${q.opts.map((o, oi) => `
                                    <label style="display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.15); padding:8px 12px; border-radius:4px; cursor:pointer; font-size:0.9rem;">
                                        <input type="radio" name="q_ans_${index}" value="${oi}"> ${o}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    questionsBody.insertAdjacentHTML('beforeend', qHtml);
                });

            }, 800);
        }

        function closeQuizModal() {
            document.getElementById('quiz-modal-overlay').style.display = 'none';
        }

        // Initialize execution on runtime loop lifecycle trigger
        renderTutorialBoards();
    </script>
</body>
</html>
