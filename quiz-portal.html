<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Quiz Portal - Conceptual Bridge</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
            background: linear-gradient(-45deg, #1a365d, #2a4365, #2b6cb0, #3182ce);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .back-btn {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 16px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-left-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .back-btn:hover { 
            background: rgba(255, 255, 255, 0.25); 
        }

        .quiz-container {
            max-width: 750px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-top-color: rgba(255, 255, 255, 0.55);
            border-left-color: rgba(255, 255, 255, 0.55);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
        }

        h2 {
            margin-top: 0;
            font-weight: 400;
            color: #bfdbfe;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 12px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .status-msg {
            text-align: center;
            font-style: italic;
            color: #cbd5e1;
            padding: 20px;
        }

        .question-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 20px;
        }

        .question-text {
            font-weight: 500;
            margin-bottom: 15px;
            font-size: 1.05rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .option-label:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(180deg, #3182ce 0%, #2b6cb0 100%);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(43, 108, 176, 0.4);
            transition: all 0.2s;
        }
        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(99, 179, 237, 0.5);
            transform: translateY(-1px);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <a href="tutorials.html" class="back-btn">← Back to Tutorials</a>

    <div class="quiz-container">
        <h2>✍️ Target Practice Assessment</h2>
        
        <div id="quiz-status" class="status-msg">Initializing test environment...</div>
        <form id="quiz-form" style="display: none;">
            <div id="questions-pool" style="display: flex; flex-direction: column; gap: 5px;"></div>
            <button type="submit" class="btn-submit" style="margin-top: 15px;">Submit Final Answers</button>
        </form>
    </div>

    <script>
        let selectedQuestions = [];

        async function initQuizPortal() {
            const statusEl = document.getElementById('quiz-status');
            const formEl = document.getElementById('quiz-form');
            const poolEl = document.getElementById('questions-pool');

            // 1. Read the parameters from the active URL path
            const urlParams = new URLSearchParams(window.location.search);
            const sourceFile = urlParams.get('source');

            if (!sourceFile) {
                statusEl.innerText = "Error: No target question source file specified.";
                return;
            }

            try {
                // 2. Fetch the designated file layout from your folder
                statusEl.innerText = `Fetching questions from target pool...`;
                const response = await fetch(sourceFile);
                if (!response.ok) throw new Error("Could not connect to the designated text asset.");

                const rawText = await response.text();

                // 3. Process data lines safely
                const lines = rawText.split('\n')
                                     .map(l => l.trim())
                                     .filter(l => l.length > 0 && l.includes('|'));

                if (lines.length === 0) throw new Error("The target question file is currently empty.");

                let allQuestions = [];
                lines.forEach(line => {
                    const parts = line.split('|');
                    if (parts.length >= 5) {
                        allQuestions.push({
                            question: parts[0].trim(),
                            options: [parts[1].trim(), parts[2].trim(), parts[3].trim(), parts[4].trim()]
                        });
                    }
                });

                if (allQuestions.length === 0) throw new Error("Format mismatch inside file. Expected Question|A|B|C|D.");

                // 4. Fisher-Yates Shuffling Algorithm to scramble all questions
                for (let i = allQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
                }

                // 5. Slice precisely out the top 10 questions row allocations
                selectedQuestions = allQuestions.slice(0, 10);

                // 6. Build and inject elements into the DOM code blocks
                statusEl.style.display = 'none';
                formEl.style.display = 'block';

                selectedQuestions.forEach((q, qIndex) => {
                    const html = `
                        <div class="question-card">
                            <div class="question-text">Q${qIndex + 1}: ${q.question}</div>
                            <div class="options-grid">
                                ${q.options.map((option, optIndex) => `
                                    <label class="option-label">
                                        <input type="radio" name="question_${qIndex}" value="${optIndex}" required>
                                        <span>${option}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    poolEl.insertAdjacentHTML('beforeend', html);
                });

            } catch (err) {
                console.error(err);
                statusEl.style.color = '#fca5a5';
                statusEl.innerText = `System Error: ${err.message || "Failed to load quiz asset."}`;
            }
        }

        // Handle submission tracking behavior
        document.getElementById('quiz-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Assessment complete! Your metrics have been successfully submitted to the server portal.");
            window.location.href = "tutorials.html";
        });

        // Initialize engine on browser window viewport activation
        initQuizPortal();
    </script>
</body>
</html>
