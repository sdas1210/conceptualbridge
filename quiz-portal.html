<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Examination Engine - Conceptual Bridge</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a202c;
            color: white;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 40px auto;
            background: #2d3748;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4a5568;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .timer-box {
            background: #e53e3e;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .option-item {
            background: #4a5568;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option-item:hover { background: #718096; }
        .option-item.selected { background: #3182ce; border: 1px solid #63b3ed; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn {
            background: #3182ce;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #2b6cb0; }
        .palette-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
        .palette-dot {
            width: 35px;
            height: 35px;
            background: #4a5568;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .palette-dot.active { background: #3182ce; }
        .palette-dot.answered { background: #48bb78; }
    </style>
</head>
<body>

    <div class="quiz-container" id="main-interface">
        <div class="header-bar">
            <span id="current-index-label" style="font-weight: 600; color: #cbd5e1;">Loading Matrix...</span>
            <div class="timer-box" id="clock-display">00:00</div>
        </div>

        <div id="target-question-text" style="font-size: 1.25rem; line-height: 1.6; margin-bottom: 25px;"></div>
        <div id="target-options-container"></div>

        <div class="nav-buttons">
            <button class="btn" onclick="navigateQuestion(-1)">← Previous</button>
            <button class="btn" id="next-action-btn" onclick="navigateQuestion(1)">Save & Next →</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #4a5568; margin-top: 40px;">
        <div class="palette-grid" id="palette-grid-holder"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const activeTopic = urlParams.get('topic') || 'Mathematics';
        const questionLimit = parseInt(urlParams.get('limit')) || 10;

        let examDataMatrix = [];
        let activeIndex = 0;
        let selectedAnswers = [];
        let timeRemainingSeconds = questionLimit * 60;
        let timerEngine = null;

        async function initializeQuizEngine() {
            try {
                // Uses clean absolute location targeting routing protocols
                const response = await fetch(`/api/fetch-questions?topic=${activeTopic}&limit=${questionLimit}`);
                
                if (!response.ok) {
                    showMissingFileScreen(`Server responded with bad status: ${response.status}`);
                    return;
                }

                const payload = await response.json();
                
                let targetQuestions = [];
                if (payload && payload.status === 'ok' && Array.isArray(payload.data)) {
                    targetQuestions = payload.data;
                } else if (Array.isArray(payload)) {
                    targetQuestions = payload;
                }

                if (targetQuestions.length > 0) {
                    examDataMatrix = targetQuestions;
                    selectedAnswers = new Array(examDataMatrix.length).fill(null);
                    startClockCountdown();
                    renderExamWindow();
                } else {
                    showMissingFileScreen("The server returned an empty array or wrong data format.");
                }
            } catch (err) {
                showMissingFileScreen(`Error processing layout files: ${err.message}`);
            }
        }

        function showMissingFileScreen(debugMessage) {
            document.getElementById('main-interface').innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <h1 style="font-size:2.2rem; color:#fc8181; margin-bottom:10px;">⚠️ Content Available Soon</h1>
                    <p style="color:#cbd5e1; font-size:1.1rem; margin-bottom:10px;">The data matrix question bank for "${activeTopic}" is currently undergoing alignment processing updates.</p>
                    <p style="color:#a0aec0; font-size:0.9rem; font-style:italic; margin-bottom:30px;">Debug: ${debugMessage}</p>
                    <button onclick="window.location.href='exams.html'" style="background:#3182ce; color:white; border:none; padding:12px 30px; font-weight:700; border-radius:6px; cursor:pointer;">← Go Back</button>
                </div>
            `;
        }

        function startClockCountdown() {
            timerEngine = setInterval(() => {
                if (timeRemainingSeconds <= 0) {
                    clearInterval(timerEngine);
                    alert("Time boundary reached! Transmitting metrics logs.");
                    triggerExamSubmission();
                } else {
                    timeRemainingSeconds--;
                    const mins = Math.floor(timeRemainingSeconds / 60).toString().padStart(2, '0');
                    const secs = (timeRemainingSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('clock-display').innerText = `${mins}:${secs}`;
                }
            }, 1000);
        }

        function renderExamWindow() {
            if (examDataMatrix.length === 0) return;
            const currentItem = examDataMatrix[activeIndex];
            
            const examLabel = currentItem.exam ? `[${currentItem.exam} - ${currentItem.shift || ''}]` : '';
            document.getElementById('current-index-label').innerText = `Question ${activeIndex + 1} of ${examDataMatrix.length} ${examLabel}`;
            document.getElementById('target-question-text').innerHTML = currentItem.text;
            
            const container = document.getElementById('target-options-container');
            container.innerHTML = '';
            
            const optArray = [currentItem.a, currentItem.b, currentItem.c, currentItem.d];
            optArray.forEach((opt, idx) => {
                const isSelected = selectedAnswers[activeIndex] === idx;
                const optHtml = `
                    <div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectOptionIndex(${idx})">
                        <input type="radio" name="quiz-opt" id="opt-${idx}" ${isSelected ? 'checked' : ''} style="display:none;">
                        <label style="cursor:pointer; width:100%;"><strong>${String.fromCharCode(65 + idx)}.</strong> ${opt}</label>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', optHtml);
            });

            const nextBtn = document.getElementById('next-action-btn');
            nextBtn.innerText = (activeIndex === examDataMatrix.length - 1) ? "Save & Finish" : "Save & Next →";

            renderPaletteGrid();
        }

        function selectOptionIndex(idx) {
            selectedAnswers[activeIndex] = idx;
            renderExamWindow();
        }

        function renderPaletteGrid() {
            const grid = document.getElementById('palette-grid-holder');
            grid.innerHTML = '';
            examDataMatrix.forEach((_, idx) => {
                let statusClass = '';
                if (idx === activeIndex) statusClass = 'active';
                else if (selectedAnswers[idx] !== null) statusClass = 'answered';

                const cell = `<div class="palette-dot ${statusClass}" onclick="jumpToQuestion(${idx})">${idx + 1}</div>`;
                grid.insertAdjacentHTML('beforeend', cell);
            });
        }

        function navigateQuestion(direction) {
            let nextPos = activeIndex + direction;
            if (nextPos >= 0 && nextPos < examDataMatrix.length) {
                activeIndex = nextPos;
                renderExamWindow();
            } else if (nextPos === examDataMatrix.length) {
                triggerExamSubmission();
            }
        }

        function jumpToQuestion(idx) {
            activeIndex = idx;
            renderExamWindow();
        }

        function triggerExamSubmission() {
            if (timerEngine) clearInterval(timerEngine);
            let score = 0;
            examDataMatrix.forEach((q, i) => {
                if (selectedAnswers[i] === q.correct) score++;
            });
            alert(`Exam Session Complete!\n\nScore: ${score} / ${examDataMatrix.length}\nAccuracy: ${((score / examDataMatrix.length) * 100).toFixed(1)}%`);
            window.location.href = 'exams.html';
        }

        initializeQuizEngine();
    </script>
</body>
</html>
