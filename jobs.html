<script>
        const targetFeedUrl = '/api/fetch-jobs';

        async function fetchJobFeeds() {
            try {
                const response = await fetch(targetFeedUrl);
                
                // If Vercel returns an error code (like 404 or 500)
                if (!response.ok) {
                    throw new Error(`Server returned status code ${response.status}`);
                }

                const data = await response.json();

                if (data.status === 'ok' && data.items) {
                    // Clear all loading texts safely
                    document.getElementById('vacancies-loader').style.display = 'none';
                    document.getElementById('admit-loader').style.display = 'none';
                    document.getElementById('results-loader').style.display = 'none';

                    data.items.forEach(item => {
                        const title = item.title;
                        const link = item.link;
                        const dateStr = item.pubDate ? item.pubDate.split(' ')[0] : 'Live';

                        const itemHtml = `
                            <li class="alert-item">
                                <a href="${link}" target="_blank">${title}</a>
                                <span class="date-badge">${dateStr}</span>
                            </li>
                        `;

                        const lowerTitle = title.toLowerCase();
                        if (lowerTitle.includes('result') || lowerTitle.includes('marks') || lowerTitle.includes('scorecard')) {
                            document.getElementById('results-list').insertAdjacentHTML('beforeend', itemHtml);
                        } else if (lowerTitle.includes('admit') || lowerTitle.includes('call letter') || lowerTitle.includes('hall ticket')) {
                            document.getElementById('admit-list').insertAdjacentHTML('beforeend', itemHtml);
                        } else {
                            document.getElementById('vacancies-list').insertAdjacentHTML('beforeend', itemHtml);
                        }
                    });

                    checkEmptyLists();
                } else {
                    // If the server answered but sent an error package
                    throw new Error(data.message || "Unexpected data structure from server.");
                }
            } catch (err) {
                console.error("Feed error:", err);
                document.querySelectorAll('.loading-text').forEach(el => {
                    el.style.color = '#ff8080';
                    el.innerText = `Sync Error: ${err.message}`;
                });
            }
        }

        function checkEmptyLists() {
            ['vacancies', 'admit', 'results'].forEach(type => {
                const list = document.getElementById(`${type}-list`);
                if (list.children.length === 0) {
                    const loader = document.getElementById(`${type}-loader`);
                    loader.style.display = 'block';
                    loader.innerText = "No updates found in this section.";
                }
            });
        }

        fetchJobFeeds();
    </script>
